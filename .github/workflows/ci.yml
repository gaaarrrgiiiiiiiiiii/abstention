name: CI — Abstention Governance Framework

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # CPU-only torch for CI speed
          pip install torch==2.3.0+cpu --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # E501 = line too long (relaxed to 120 for research code)
          # W503 = line break before operator (Black style)
          flake8 src/ agents/ api/ tests/ \
            --max-line-length=120 \
            --ignore=W503,E203 \
            --exclude=src/__pycache__,agents/__pycache__

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src --cov=agents \
            --cov-report=term-missing \
            --cov-fail-under=30

      - name: API smoke test (model not loaded)
        run: |
          # Test that Flask app starts and health endpoint responds
          python -c "
          import sys, os
          sys.path.insert(0, 'src')
          sys.path.insert(0, 'api')
          import importlib.util
          spec = importlib.util.spec_from_file_location('app', 'api/app.py')
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          m.app.config['TESTING'] = True
          client = m.app.test_client()
          r = client.get('/api/health')
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          print('Health check OK:', r.get_json())
          r2 = client.get('/api/sample-data')
          assert r2.status_code == 200, f'Sample data failed: {r2.status_code}'
          print('Sample data OK')
          "

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t abstention-api:ci --target runtime .

      - name: Test Docker image health
        run: |
          # Start container without model (should start but /api/ready = 503)
          docker run -d --name abstention-test -p 5000:5000 abstention-api:ci
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health)
          echo "Health endpoint returned: $STATUS"
          test "$STATUS" = "200"
          docker stop abstention-test
          docker rm abstention-test
