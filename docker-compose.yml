version: "3.9"

services:
  # ── Flask Prediction API ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: abstention-api:latest
    container_name: abstention-api
    ports:
      - "5000:5000"
    volumes:
      # Mount trained model artifacts (read-only)
      - ./abstention_model.pth:/app/abstention_model.pth:ro
      - ./data/model_metadata.json:/app/data/model_metadata.json:ro
      # Writable log volume
      - api-logs:/app/logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Frontend (nginx static file server) ───────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: abstention-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-logs:
    driver: local
